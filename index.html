<!DOCTYPE html>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

              DEFAULT: '#007AFF',

              dark: '#248a3d'

  <style>
    body {

</head>
<body class="text-foreground antialiased">
  
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    
    // --- 1. Icons ---
    const IconWrapper = ({ className, children }) => (
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
        className={className}
      >
        {children}
      </svg>
    );

    const ChevronDown = ({ className }) => <IconWrapper className={className}><path d="m6 9 6 6 6-6" /></IconWrapper>;
    const Menu = ({ className }) => <IconWrapper className={className}><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="18" x2="21" y2="18" /></IconWrapper>;
    const X = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></IconWrapper>;
    const Quote = ({ className }) => <IconWrapper className={className}><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z" /><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z" /></IconWrapper>;
    const Plus = ({ className }) => <IconWrapper className={className}><path d="M5 12h14" /><path d="M12 5v14" /></IconWrapper>;
    const MessageCircle = ({ className }) => <IconWrapper className={className}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z" /></IconWrapper>;
    const CheckCircle = ({ className }) => <IconWrapper className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></IconWrapper>;
    const Camera = ({ className }) => <IconWrapper className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></IconWrapper>;
    const FileText = ({ className }) => <IconWrapper className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></IconWrapper>;

    // --- 2. Components ---

    const Button = ({ variant = 'default', size = 'default', className = '', children, ...props }) => {
      const baseStyle = "inline-flex items-center justify-center rounded-lg text-sm font-medium transition-colors focus-visible:outline-none disabled:opacity-50 disabled:pointer-events-none";
      
      const variants = {
        default: "bg-primary text-primary-foreground hover:bg-primary-dark shadow-sm",
        outline: "border border-border bg-surface hover:bg-muted text-foreground",
        ghost: "hover:bg-muted text-foreground",
        link: "text-primary underline-offset-4 hover:underline",
        secondary: "bg-secondary text-white hover:bg-secondary-dark",
      };

      const sizes = {
        default: "h-10 py-2 px-4",
        sm: "h-9 rounded-md px-3",
        lg: "h-12 rounded-lg px-8 text-base",
        icon: "h-10 w-10",
      };

      return (
        <button className={`${baseStyle} ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
          {children}
        </button>
      );
    };

    const Card = ({ className = '', children, onClick, ...props }) => (
      <div 
        className={`bg-surface rounded-xl border border-border shadow-card overflow-hidden ${className}`} 
        onClick={onClick}
        {...props}
      >
        {children}
      </div>
    );

    // --- Modal Components ---

    const ModalBase = ({ isOpen, onClose, title, children, maxWidth = "max-w-lg" }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
          <div 
            className={`bg-white rounded-2xl shadow-2xl w-full ${maxWidth} max-h-[90vh] overflow-y-auto relative animate-slide-up border-t-4 border-primary`}
            onClick={e => e.stopPropagation()}
          >
            <div className="sticky top-0 bg-white z-10 px-6 py-4 border-b flex justify-between items-center">
              <h3 className="text-xl font-bold text-gray-900">{title}</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors">
                <X className="w-6 h-6" />
              </button>
            </div>
            <div className="p-6">
              {children}
            </div>
          </div>
        </div>
      );
    };

    // 1. Mentoring Application Modal
    const MentoringModal = ({ isOpen, onClose }) => {
      const targetMentors = ["최인경", "권인선", "장승봉", "백소영", "정유미", "엄유미"];
      
      const handleApply = (mentorName) => {
        alert(`${mentorName} 멘토님에게 신청이 접수되었습니다.\n담당자가 확인 후 연락드리겠습니다.`);
      };

      return (
        <ModalBase isOpen={isOpen} onClose={onClose} title="1:1 멘토링 신청" maxWidth="max-w-3xl">
          <div className="mb-6 bg-primary/5 p-4 rounded-lg border border-primary/20">
            <h4 className="font-bold text-primary mb-2 flex items-center gap-2">
              <CheckCircle className="w-5 h-5" /> 신청 방법
            </h4>
            <ol className="list-decimal list-inside text-sm text-gray-700 space-y-1">
              <li>아래 목록에서 원하시는 멘토님을 확인하세요.</li>
              <li>[신청하기] 버튼을 클릭하면 가접수가 완료됩니다.</li>
              <li>추후 운영진이 일정 조율을 위해 연락드립니다.</li>
            </ol>
          </div>
          
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {targetMentors.map((name, idx) => (
              <div key={idx} className="flex items-center justify-between p-4 border rounded-xl hover:border-primary transition-colors bg-white shadow-sm">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center font-bold text-gray-600">
                    {name[0]}
                  </div>
                  <span className="font-semibold text-lg">{name} <span className="text-xs text-gray-500 font-normal">멘토</span></span>
                </div>
                <Button size="sm" onClick={() => handleApply(name)}>신청하기</Button>
              </div>
            ))}
          </div>
        </ModalBase>
      );
    };

    // 2. Random Quote/Tip Modal (Shared for Career & Portfolio)
    const RandomTextModal = ({ isOpen, onClose, title, content, subText }) => {
      return (
        <ModalBase isOpen={isOpen} onClose={onClose} title={title}>
           <div className="flex flex-col items-center text-center space-y-6 py-4">
              <div className="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center text-primary mb-2">
                {title.includes("명언") ? <Quote className="w-8 h-8" /> : <FileText className="w-8 h-8" />}
              </div>
              
              <div className="relative w-full">
                <span className="text-4xl absolute -top-4 left-0 text-gray-200 opacity-50">"</span>
                <p className="text-xl md:text-2xl font-bold text-gray-800 leading-relaxed px-6 break-keep">
                  {content}
                </p>
                <span className="text-4xl absolute -bottom-8 right-0 text-gray-200 opacity-50">"</span>
              </div>
              
              {subText && <p className="text-sm text-gray-500 font-medium pt-4">- {subText} -</p>}
              
              <Button onClick={onClose} className="mt-4 w-full md:w-auto">
                닫기
              </Button>
            </div>
        </ModalBase>
      );
    };

    // 4. Gallery Modal
    const GalleryModal = ({ isOpen, onClose }) => {
      const images = ["park1.png", "park2.png", "park3.png", "park4.png"];
      return (
        <ModalBase isOpen={isOpen} onClose={onClose} title="2025 진로 박람회 현장" maxWidth="max-w-4xl">
          <p className="text-muted-foreground mb-4">뜨거웠던 박람회의 현장을 사진으로 만나보세요.</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {images.map((img, idx) => (
              <div key={idx} className="rounded-lg overflow-hidden border border-border shadow-sm aspect-video bg-gray-100 relative group">
                <img 
                   src={img} 
                   alt={`박람회 사진 ${idx+1}`} 
                   className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                   onError={(e) => {
                     e.target.onerror = null;
                     e.target.src = `https://placehold.co/600x400/f1f5f9/64748b?text=Expo+Image+${idx+1}`;
                   }}
                />
              </div>
            ))}
          </div>
        </ModalBase>
      );
    };


    // --- 3. Page Layout Components ---

    const Header = ({ onNavigate }) => {
      const [isMenuOpen, setIsMenuOpen] = React.useState(false);
      const [activeDropdown, setActiveDropdown] = React.useState(null);

      const navItems = [
        { 
          name: "진로드림 소개", 
          href: "#about",
          children: [
            { name: "소개 및 연혁", href: "#about" },
            { name: "수상 내역", href: "#about" },
          ]
        },
        { 
          name: "핵심 서비스", 
          href: "#services",
          children: [
            { name: "초등 수업", href: "#services", action: () => onNavigate('초등') },
            { name: "중등 수업", href: "#services", action: () => onNavigate('중등') },
            { name: "고등 수업", href: "#services", action: () => onNavigate('고등') },
            { name: "성인 수업", href: "#services", action: () => onNavigate('성인') },
          ]
        },
        { 
          name: "멘토 찾기", 
          href: "#mentors",
          children: [
            { name: "전체 멘토", href: "#mentors" },
            { name: "멘토 지원", href: "#" },
          ]
        },
        { 
          name: "커뮤니티", 
          href: "#community",
          children: [
            { name: "새 소식", href: "#community" },
            { name: "선배들의 이야기", href: "#testimonials" },
          ]
        },
        { 
          name: "고객센터", 
          href: "#contact",
          children: [
            { name: "연락처 및 위치", href: "#contact" },
            { name: "FAQ", href: "#" },
          ]
        },
      ];

      const toggleDropdown = (name) => {
        if (activeDropdown === name) {
          setActiveDropdown(null);
        } else {
          setActiveDropdown(name);
        }
      };

      const handleLinkClick = (child) => {
        setActiveDropdown(null);
        setIsMenuOpen(false);
        if (child.action) {
          child.action();
        }
      };

      return (
        <header className="sticky top-0 z-40 w-full bg-surface/95 backdrop-blur supports-[backdrop-filter]:bg-surface/60 border-b border-border shadow-sm">
          <div className="container mx-auto px-4 h-16 flex items-center justify-between">
            {/* Logo */}
            <a href="#" className="flex items-center gap-2">
              <span className="text-xl font-bold bg-gradient-to-r from-primary-dark to-primary bg-clip-text text-transparent">
                진로드림
              </span>
            </a>
            
            {/* Desktop Navigation */}
            <nav className="hidden md:flex gap-1">
              {navItems.map((item) => (
                <div key={item.name} className="relative group">
                  <button
                    className={`flex items-center gap-1 px-4 py-2 text-sm font-medium rounded-md transition-colors text-muted-foreground hover:text-foreground hover:bg-muted`}
                    onClick={() => toggleDropdown(item.name)}
                  >
                    {item.name}
                    {item.children && (
                      <ChevronDown className="h-4 w-4 transition-transform group-hover:rotate-180" />
                    )}
                  </button>
                  {item.children && (
                    <div className="absolute top-full left-0 mt-1 w-48 bg-surface rounded-lg shadow-lg border border-border p-1 z-50 hidden group-hover:block animate-fade-in">
                      {item.children.map((child) => (
                        <a
                          key={child.name}
                          href={child.href}
                          className="block px-4 py-2 text-sm text-foreground rounded-md hover:bg-muted transition-colors cursor-pointer"
                          onClick={() => handleLinkClick(child)}
                        >
                          {child.name}
                        </a>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </nav>
            
            {/* Mobile Menu Toggle */}
            <div className="md:hidden">
              <Button variant="ghost" size="icon" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                {isMenuOpen ? <X className="h-5 w-5" /> : <Menu className="h-5 w-5" />}
              </Button>
            </div>
          </div>
          
          {/* Mobile Navigation */}
          {isMenuOpen && (
            <div className="md:hidden absolute top-16 left-0 w-full bg-surface border-b border-border shadow-lg p-4 z-40">
              <nav className="flex flex-col space-y-2">
                {navItems.map((item) => (
                  <div key={item.name} className="rounded-lg overflow-hidden">
                    <button
                      onClick={() => toggleDropdown(item.name)}
                      className="flex items-center justify-between w-full px-4 py-3 text-left text-sm font-medium text-foreground bg-muted/50 hover:bg-muted"
                    >
                      {item.name}
                      {item.children && (
                        <ChevronDown className={`h-4 w-4 transition-transform ${activeDropdown === item.name ? 'rotate-180' : ''}`} />
                      )}
                    </button>
                    {item.children && activeDropdown === item.name && (
                      <div className="bg-muted/30 px-4 py-2 space-y-1">
                        {item.children.map((child) => (
                          <a
                            key={child.name}
                            href={child.href}
                            className="block py-2 text-sm text-muted-foreground hover:text-primary pl-2 border-l-2 border-transparent hover:border-primary transition-colors cursor-pointer"
                            onClick={() => handleLinkClick(child)}
                          >
                            {child.name}
                          </a>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </nav>
            </div>
          )}
        </header>
      );
    };

    const Footer = ({ onNavigate }) => {
      return (
        <footer id="contact" className="bg-surface border-t border-border mt-auto">
          <div className="container mx-auto px-4 py-12">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
              <div className="space-y-4">
                <h4 className="text-lg font-bold text-primary">진로드림</h4>
                <p className="text-sm text-muted-foreground leading-relaxed">
                  당신의 잠재력을 현실로,<br/>진로드림이 함께합니다
                </p>
              </div>
              <div>
                <h5 className="font-semibold mb-4 text-foreground">서비스</h5>
                <ul className="space-y-2 text-sm">
                  <li><a href="#services" onClick={() => onNavigate('초등')} className="text-muted-foreground hover:text-primary transition-colors cursor-pointer">초등 수업</a></li>
                  <li><a href="#services" onClick={() => onNavigate('중등')} className="text-muted-foreground hover:text-primary transition-colors cursor-pointer">중등 수업</a></li>
                  <li><a href="#services" onClick={() => onNavigate('고등')} className="text-muted-foreground hover:text-primary transition-colors cursor-pointer">고등 수업</a></li>
                  <li><a href="#services" onClick={() => onNavigate('성인')} className="text-muted-foreground hover:text-primary transition-colors cursor-pointer">성인 수업</a></li>
                </ul>
              </div>
              <div>
                <h5 className="font-semibold mb-4 text-foreground">회사</h5>
                <ul className="space-y-2 text-sm">
                  <li><a href="#about" className="text-muted-foreground hover:text-primary transition-colors">진로드림 소개</a></li>
                  <li><a href="#mentors" className="text-muted-foreground hover:text-primary transition-colors">멘토 지원</a></li>
                  <li><a href="#community" className="text-muted-foreground hover:text-primary transition-colors">새 소식</a></li>
                </ul>
              </div>
              <div>
                <h5 className="font-semibold mb-4 text-foreground">고객센터</h5>
                <ul className="space-y-3 text-sm">
                  <li className="flex items-center gap-2">
                    <span className="w-16 text-muted-foreground">전화</span>
                    <a href="tel:010-4135-6232" className="text-foreground hover:text-primary font-medium">010.4135.6232</a>
                  </li>
                  <li className="flex items-start gap-2">
                    <span className="w-16 text-muted-foreground shrink-0">웹사이트</span>
                    <a href="http://jinrodream@jinrodream.com" target="_blank" rel="noopener noreferrer" className="text-foreground hover:text-primary break-all">
                      jinrodream@jinrodream.com
                    </a>
                  </li>
                </ul>
              </div>
            </div>
            <div className="border-t border-border mt-12 pt-8 text-center">
              <p className="text-sm text-muted-foreground">
                &copy; {new Date().getFullYear()} Jinro Dream. All rights reserved.
              </p>
            </div>
          </div>
        </footer>
      );
    };

    const Index = () => {
      const [activeTab, setActiveTab] = React.useState("초등");
      
      // Modal States
      const [modalType, setModalType] = React.useState(null); // 'mentoring', 'quote', 'portfolio', 'gallery'
      const [modalContent, setModalContent] = React.useState({}); 

      // Data Arrays
      const careerQuotes = [
        { text: "가장 큰 모험은 당신이 꿈꾸는 삶을 사는 것이다.", author: "오프라 윈프리" },
        { text: "미래는 꿈의 아름다움을 믿는 사람들의 것이다.", author: "엘리노어 루즈벨트" },
        { text: "실패는 다시 시작할 수 있는 기회다. 더 현명하게.", author: "헨리 포드" },
        { text: "당신이 좋아하는 일을 하라. 성공은 따라올 것이다.", author: "알버트 슈바이처" },
        { text: "기회는 일어나는 것이 아니라 만들어내는 것이다.", author: "크리스 그로서" },
        { text: "천리길도 한 걸음부터.", author: "노자" },
        { text: "재능보다 중요한 것은 꾸준함이다.", author: "안젤라 더크워스" },
        { text: "당신의 시간은 한정되어 있다. 타인의 삶을 사느라 낭비하지 마라.", author: "스티브 잡스" },
        { text: "준비된 자에게 기회가 온다.", author: "루이 파스퇴르" },
        { text: "오늘 걷지 않으면 내일은 뛰어야 한다.", author: "카를레스 푸욜" }
      ];

      const portfolioTips = [
        "결과물뿐만 아니라 과정(Process)을 상세히 기록하세요.",
        "지원하는 직무와 관련된 프로젝트를 최상단에 배치하세요.",
