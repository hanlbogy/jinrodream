  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans KR', 'sans-serif'],
          },
          colors: {
            primary: { DEFAULT: '#007AFF', foreground: '#FFFFFF', dark: '#005bb5', light: '#e6f2ff' },
            secondary: { DEFAULT: '#34C759', foreground: '#FFFFFF' },
            accent: { DEFAULT: '#FF9500', foreground: '#FFFFFF' },
            surface: '#FFFFFF',
            background: '#F8FAFC',
            border: '#E2E8F0',
            muted: { DEFAULT: '#F1F5F9', foreground: '#64748B' }
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }

  <style>
    body { background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-slate-900 antialiased selection:bg-primary/20">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 1. Icons (Feather Icons style SVG) ---
    const Icon = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const MenuIcon = (p) => <Icon {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;
    const XIcon = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
    const QuoteIcon = (p) => <Icon {...p}><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/></Icon>;
    const ClickIcon = (p) => <Icon {...p}><path d="m14 4.1 2.8 2.8"/><path d="M5.4 13.5 10.4 8.5 13.2 11.3 12 12.5 4.8 19.7 4.8 19.7c-.3.3-.3.8 0 1.1l5 5c.3.3.8.3 1.1 0l7.2-7.2"/><path d="M22 2l-7.2 7.2"/></Icon>;
    const CheckIcon = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
    const PlusIcon = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;

    // --- 2. UI Components ---
    const Button = ({ variant = 'default', size = 'default', className = '', children, ...props }) => {
      const variants = {
        default: "bg-primary text-white hover:bg-primary-dark shadow-sm active:scale-95",
        outline: "border border-white/30 bg-white/10 hover:bg-white/20 text-white backdrop-blur-sm",
        ghost: "hover:bg-muted text-slate-700",
      };
      const sizes = { sm: "h-8 px-3 text-xs", default: "h-10 px-4 py-2 text-sm", lg: "h-12 px-8 text-base" };
      return <button className={`inline-flex items-center justify-center rounded-lg font-medium transition-all duration-200 ${variants[variant]} ${sizes[size]} ${className}`} {...props}>{children}</button>;
    };

    const Card = ({ className = '', children, onClick, ...props }) => (
      <div className={`bg-surface rounded-xl border border-border shadow-sm overflow-hidden ${onClick ? 'cursor-pointer active:scale-[0.98] transition-transform' : ''} ${className}`} onClick={onClick} {...props}>{children}</div>
    );

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 relative animate-slide-up max-h-[85vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4 border-b pb-3 sticky top-0 bg-white z-10">
              <h3 className="text-lg md:text-xl font-bold text-slate-900">{title}</h3>
              <button onClick={onClose} className="p-1 rounded-full hover:bg-slate-100 transition-colors"><XIcon className="w-6 h-6 text-slate-500" /></button>
            </div>
            {children}
          </div>
        </div>
      );
    };

    // --- 3. Layout Components ---
    const Header = ({ onNavigate }) => {
      const [isOpen, setIsOpen] = useState(false);
      
      const scrollToSection = (id) => {
        setIsOpen(false);
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      };

      const handleNavClick = (tab) => {
        onNavigate(tab);
        scrollToSection('services');
      };

      return (
        <header className="sticky top-0 z-40 w-full bg-surface/90 backdrop-blur-md border-b border-border">
          <div className="container mx-auto px-4 h-16 flex items-center justify-between">
            <div className="text-xl font-black bg-gradient-to-r from-primary-dark to-primary bg-clip-text text-transparent cursor-pointer" onClick={() => window.scrollTo(0,0)}>
              진로드림
            </div>
            
            {/* Desktop Nav */}
            <nav className="hidden md:flex gap-6 text-sm font-medium text-slate-600">
              <button onClick={() => scrollToSection('about')} className="hover:text-primary transition-colors">소개</button>
              <div className="relative group">

                  ))}
                </div>
              </div>
              <button onClick={() => scrollToSection('mentors')} className="hover:text-primary transition-colors">멘토</button>
              <button onClick={() => scrollToSection('community')} className="hover:text-primary transition-colors">소식</button>
            </nav>

            {/* Mobile Menu Button */}
            <button className="md:hidden p-2" onClick={() => setIsOpen(!isOpen)}>
              {isOpen ? <XIcon /> : <MenuIcon />}
            </button>
          </div>

          {/* Mobile Nav */}
          {isOpen && (
            <div className="md:hidden bg-surface border-b border-border absolute w-full shadow-xl animate-fade-in">

                  {['초등', '중등', '고등', '성인'].map(t => (
                    <button key={t} onClick={() => handleNavClick(t)} className="block w-full text-left py-1 text-sm text-slate-600 hover:text-primary">{t} 수업</button>

              </nav>

          )}

            </div>
            <div>

                <li><a href="#mentors" className="hover:text-primary">멘토 찾기</a></li>
                <li><a href="#community" className="hover:text-primary">새 소식</a></li>
              </ul>
            </div>
            <div>

            <div>
              <h5 className="font-semibold mb-3">고객센터</h5>
              <ul className="space-y-2 text-sm text-slate-500">
                <li><span className="font-medium text-slate-900">Tel.</span> 010.4135.6232</li>
                <li><span className="font-medium text-slate-900">Email.</span> jinrodream@jinrodream.com</li>
              </ul>
            </div>
          </div>
          <div className="border-t pt-8 text-center text-xs text-slate-400">
            &copy; {new Date().getFullYear()} Jinro Dream. All rights reserved.
          </div>
        </div>
      </footer>
    );

    // --- 4. Main Content Component ---
    const App = () => {
      const [activeTab, setActiveTab] = useState("초등");
      const [modalState, setModalState] = useState({ isOpen: false, type: null, content: null });

      // Data
      const mentoringList = ["최인경", "권인선", "장승봉", "백소영", "정유미", "엄유미"];
      const quotes = [
        "가장 큰 모험은 당신이 꿈꾸는 삶을 사는 것이다. - 오프라 윈프리",
        "미래는 꿈의 아름다움을 믿는 사람들의 것이다. - 엘리노어 루즈벨트",
        "좋아하는 일을 하라. 그러면 평생 하루도 일하지 않아도 될 것이다. - 공자",
        "기회는 일어나는 것이 아니라 만들어내는 것이다. - 크리스 그로서",

      ];
      const portfolioTips = [
        "결과물보다는 '과정'과 '문제 해결 능력'을 강조하세요.",
        "자신만의 스토리를 담아 차별화된 브랜딩을 시도하세요.",
        "지원하는 직무와 연관성 높은 프로젝트를 최우선으로 배치하세요.",
        "시각적으로 깔끔하고 가독성 좋은 레이아웃을 사용하세요.",
        "팀 프로젝트에서는 자신의 구체적인 기여도를 명확히 명시하세요."
      ];
      const mentors = [
        { name: "최인경", role: "진로드림 전체대표", exp: "진로, 독서, 경제, AI, 노동인권, 컨설팅" },
        { name: "권인선", role: "진로드림 대표", exp: "진로, 독서, 경제, 노동인권, PTS, 버츄" },
        { name: "장승봉", role: "진로연합회 대표", exp: "진로, 독서, AI, 노동인권, 면접컨설팅" },
        { name: "백소영", role: "총무", exp: "진로, 노동인권, 레크레이션, 컨설팅" },
        { name: "정유미", role: "회계", exp: "진로, 독서, 경제, 노동인권, 컨설팅" },
        { name: "엄유미", role: "서기", exp: "진로, 경제, 노동인권, 컨설팅, 퍼실리테이션" },
      ];
      const testimonials = [
        { name: "김하늘", age: "24세", txt: "막막했던 진로가 뚜렷해졌어요! 멘토님의 조언 덕분에 원하는 기업에 인턴으로 합격했습니다." },
        { name: "이준호", age: "27세", txt: "취업 준비 기간 동안 정말 큰 힘이 되었습니다. 자소서 첨삭부터 면접까지 꼼꼼하게 봐주셨어요." },
        { name: "박지민", age: "22세", txt: "나에게 맞는 직무가 무엇인지 몰랐는데, 진로수업을 통해 제 적성을 찾을 수 있었습니다." },
        { name: "최수영", age: "29세", txt: "이직 고민이 많았는데 1:1 상담을 통해 커리어 방향성을 확실히 잡고 성공적으로 이직했어요!" },
      ];

      // Handlers
      const handleNewsClick = (idx) => {
        const types = ['mentoring', 'quote', 'portfolio', 'gallery'];
        const content = idx === 1 ? quotes : idx === 2 ? portfolioTips : null;
        setModalState({ isOpen: true, type: types[idx], content: content ? content[Math.floor(Math.random() * content.length)] : null });
      };

      const handleApply = (name) => alert(`${name} 멘토님께 신청되었습니다.\n곧 연락드리겠습니다.`);
      const closeModal = () => setModalState({ ...modalState, isOpen: false });

      // Image Fallback (Robust Version)
      const getFallbackImg = (e, type, id = 0) => {
        e.currentTarget.onerror = null; // Prevent infinite loop
        const map = {
          hero: 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=2000&auto=format&fit=crop',
          class: `https://images.unsplash.com/photo-1524178232363-1fb2b075b655?q=80&w=800&fit=crop`,
          group: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?q=80&w=800&fit=crop',
          award: 'https://placehold.co/400x500/f1f5f9/64748b?text=Award+Image',
          park: `https://images.unsplash.com/photo-${id === 0 ? '1540575467063-17e6fc48dee5' : id === 1 ? '1517048696772-e5485c67133b' : '1515168892237-7ac8c3a961e2'}?q=80&w=600&fit=crop`,
          classCard: `https://placehold.co/600x800/f8fafc/cbd5e1?text=${activeTab}+Class`
        };
        e.currentTarget.src = map[type] || map['class'];
      };

      return (
        <div className="min-h-screen flex flex-col">
          <Header onNavigate={setActiveTab} />
          
          <main className="flex-1">
            {/* 1. Hero */}
            <section className="relative h-[500px] md:h-[600px] flex items-center justify-center bg-slate-900 overflow-hidden">
              <img src="gate1.png" alt="Hero" className="absolute inset-0 w-full h-full object-cover opacity-50" onError={(e) => getFallbackImg(e, 'hero')} />

              <div className="relative z-10 text-center px-4 max-w-4xl mx-auto animate-slide-up">
                <h1 className="text-4xl md:text-6xl font-black text-white mb-6 drop-shadow-lg break-keep leading-tight">
                  <span className="text-blue-400">진로드림</span> 플랫폼

                <p className="text-lg md:text-xl text-slate-200 mb-8 font-light break-keep">

                </p>
                <a href="#about"><Button size="lg" variant="outline">서비스 소개</Button></a>
              </div>
            </section>

            {/* 2. About */}
            <section id="about" className="py-20 container mx-auto px-4">
              <div className="max-w-4xl mx-auto mb-12 text-center">
                <h2 className="text-3xl font-bold mb-8">진로드림 소개</h2>
                <Card className="p-8 md:p-10 bg-white border-none shadow-lg mb-12">
                  <div className="text-lg text-slate-600 leading-relaxed break-keep space-y-4">
                    <p>진로드림은 <strong className="text-primary">2020년</strong>부터 시작된, 서울시교육청 인증 전문 강사진들의 모임입니다.</p>
                    <p><strong className="text-slate-900">2022년, 2024년 교육부 장관상</strong>을 수상하며 전문성을 인정받았으며, 우리 사회 구성원 모두가 자신의 진로를 마음껏 펼칠 수 있도록 끊임없이 노력하고 있습니다.</p>
                  </div>

                <div className="space-y-8">
                  <div className="text-left border-l-4 border-primary pl-4 mb-4"><h3 className="text-xl font-bold">생생한 수업 현장</h3></div>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    {[1, 2, 3].map(n => (
                      <div key={n} className="aspect-video rounded-xl overflow-hidden bg-slate-100 shadow-md">
                        <img src={`suup${n}.png`} className="w-full h-full object-cover hover:scale-110 transition-transform duration-500" onError={(e) => getFallbackImg(e, 'class')} alt="Class" />
                      </div>
                    ))}
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mt-8">
                    <div className="md:col-span-2 aspect-video rounded-xl overflow-hidden relative group">
                      <img src="KakaoTalk_20250626_220554929_23.jpg" className="w-full h-full object-cover" onError={(e) => getFallbackImg(e, 'group')} alt="Team" />

                    </div>
                    <div className="aspect-[3/4] rounded-xl overflow-hidden bg-slate-100"><img src="award22.jpg" className="w-full h-full object-cover" onError={(e) => getFallbackImg(e, 'award')} alt="Award 22" /></div>
                    <div className="aspect-[3/4] rounded-xl overflow-hidden bg-slate-100"><img src="award24.jpg" className="w-full h-full object-cover" onError={(e) => getFallbackImg(e, 'award')} alt="Award 24" /></div>

                      <button key={t} onClick={() => setActiveTab(t)} className={`px-6 py-2 rounded-full text-sm font-medium transition-all ${activeTab === t ? 'bg-primary text-white shadow-md' : 'bg-white border text-slate-500 hover:bg-slate-100'}`}>{t}</button>

                  {['1', '2', '3'].slice(0, activeTab === '초등' ? 1 : activeTab === '고등' || activeTab === '성인' ? 2 : 3).map((n, i) => (
                    <Card key={i} className="group">
                      <div className="aspect-[4/5] bg-white relative flex items-center justify-center p-4">
                        <img 
                          src={`${['cho','joong','goe','sung'][['초등','중등','고등','성인'].indexOf(activeTab)]}${parseInt(i)+1}.png`} 
                          className="w-full h-full object-contain group-hover:scale-105 transition-transform duration-300"
                          onError={(e) => getFallbackImg(e, 'classCard')} 
                          alt="Class Img" 
                        />
                      </div>
                    </Card>
                  ))}
                </div>
              </div>
            </section>

            {/* 4. Mentors */}
            <section id="mentors" className="py-20 container mx-auto px-4">
              <h2 className="text-3xl font-bold text-center mb-10">멘토진 소개</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {mentors.map((m, i) => (
                  <Card key={i} className="flex items-start p-5 gap-4 hover:shadow-md transition-shadow">
                    <div className="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-xl font-bold text-slate-400 shrink-0">{m.name[0]}</div>
                    <div>
                      <h4 className="font-bold text-lg text-slate-900">{m.name}</h4>
                      <div className="text-sm text-primary font-medium mb-1">{m.role}</div>
                      <p className="text-xs text-slate-500 break-keep">{m.exp}</p>
                    </div>
                  </Card>
                ))}
              </div>
              <div className="mt-8 text-center text-slate-500 text-sm font-medium flex items-center justify-center gap-1">
                <PlusIcon className="w-4 h-4"/> 외 50여 명의 전문 멘토진이 함께합니다
              </div>
            </section>

            {/* 5. News */}
            <section id="community" className="py-20 bg-slate-50 border-t border-border">
              <div className="container mx-auto px-4">
                <div className="flex justify-between items-end mb-8">
                  <h2 className="text-3xl font-bold">새 소식</h2>
                  <span className="text-xs text-slate-500 hidden md:inline">카드를 클릭하여 확인하세요</span>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {[
                    { t: "2026년 상반기 멘토링 신청 안내", d: "2026.01.10", c: "공지사항", color: "text-blue-600 bg-blue-50", act: "멘토링 신청하기" },
                    { t: "진로 탐색을 위한 5가지 필수 팁", d: "2026.01.05", c: "진로 팁", color: "text-green-600 bg-green-50", act: "오늘의 명언 보기" },
                    { t: "성공적인 포트폴리오 작성 가이드", d: "2026.01.02", c: "취업 정보", color: "text-orange-600 bg-orange-50", act: "꿀팁 확인하기" },
                    { t: "2025 진로 박람회 참가 후기", d: "2025.12.28", c: "행사 후기", color: "text-purple-600 bg-purple-50", act: "사진 갤러리 보기" }
                  ].map((item, i) => (
                    <Card key={i} onClick={() => handleNewsClick(i)} className="p-6 group hover:border-primary/40 relative">
                      <div className="absolute top-5 right-5 text-primary opacity-0 group-hover:opacity-100 transition-opacity"><ClickIcon className="w-5 h-5"/></div>
                      <div className="flex justify-between items-center mb-3">
                        <span className={`text-xs font-bold px-2 py-1 rounded ${item.color}`}>{item.c}</span>
                        <span className="text-xs text-slate-400">{item.d}</span>
                      </div>
                      <h3 className="text-lg font-bold mb-2 group-hover:text-primary transition-colors">{item.t}</h3>
                      <p className="text-sm text-slate-500 flex items-center gap-1 group-hover:underline">{item.act}</p>
                    </Card>
                  ))}
                </div>
              </div>
            </section>

            {/* 6. Testimonials */}
            <section className="py-20 container mx-auto px-4">
              <h2 className="text-3xl font-bold text-center mb-10">선배들의 이야기</h2>
              <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                {testimonials.map((t, i) => (
                  <Card key={i} className="p-6 bg-slate-50 border-none flex flex-col h-full">
                    <QuoteIcon className="w-8 h-8 text-primary/20 mb-4"/>
                    <p className="text-sm text-slate-700 leading-relaxed mb-6 flex-1">"{t.txt}"</p>
                    <div className="flex items-center gap-3">
                      <div className="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-xs font-bold text-primary">{t.name[0]}</div>
                      <div className="text-xs">
                        <div className="font-bold">{t.name}</div>
                        <div className="text-slate-400">{t.age}</div>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            </section>
          </main>
          
          <Footer onNavigate={setActiveTab} />

          {/* Modal */}
          <Modal isOpen={modalState.isOpen} onClose={closeModal} title={
            modalState.type === 'mentoring' ? '1:1 멘토링 신청' : 
            modalState.type === 'quote' ? '오늘의 진로 명언' : 
            modalState.type === 'portfolio' ? '포트폴리오 작성 꿀팁' : '2025 진로 박람회'
          }>
            {modalState.type === 'mentoring' && (
              <div className="space-y-4">
                <div className="bg-blue-50 p-4 rounded-lg text-sm text-blue-800 break-keep">
                  원하는 멘토님 옆의 <strong>[신청]</strong> 버튼을 누르면 담당자가 24시간 내 연락드립니다.
                </div>
                <div className="space-y-2">
                  {mentoringList.map((m, i) => (
                    <div key={i} className="flex items-center justify-between p-3 border rounded-lg hover:bg-slate-50">
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-xs font-bold text-slate-600">{m[0]}</div>
                        <span className="font-medium">{m} 멘토</span>
                      </div>
                      <Button size="sm" onClick={() => handleApply(m)}>신청</Button>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {modalState.type === 'quote' && (
              <div className="text-center py-8 px-2">
                <QuoteIcon className="w-10 h-10 text-green-500 mx-auto mb-4 opacity-20"/>
                <p className="text-xl font-medium text-slate-800 break-keep leading-relaxed">"{modalState.content.split('-')[0]}"</p>
                <p className="mt-4 text-sm text-slate-500 font-bold">- {modalState.content.split('-')[1]} -</p>
              </div>
            )}
            {modalState.type === 'portfolio' && (
              <div className="text-center py-6">
                <div className="bg-orange-50 p-6 rounded-xl inline-block mb-4">
                  <CheckIcon className="w-8 h-8 text-orange-500 mx-auto mb-2"/>
                  <h4 className="font-bold text-orange-700 mb-2">Check Point</h4>
                  <p className="text-lg font-medium text-slate-800 break-keep">{modalState.content}</p>
                </div>
                <p className="text-xs text-slate-400">랜덤으로 제공되는 10가지 꿀팁 중 하나입니다.</p>
              </div>
            )}
            {modalState.type === 'gallery' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {["park1.png","park2.png","park3.png","park4.png"].map((img, i) => (
                  <div key={i} className="aspect-video bg-slate-100 rounded-lg overflow-hidden relative group">
                    <img src={img} className="w-full h-full object-cover" onError={(e) => getFallbackImg(e, 'park', i)} alt="Expo" />
                  </div>
                ))}
                <p className="col-span-1 md:col-span-2 text-center text-xs text-slate-400 mt-2">이미지가 로드되지 않을 경우 샘플 이미지가 표시됩니다.</p>
              </div>
            )}
            <div className="mt-6 pt-4 border-t text-center">
              <Button variant="ghost" onClick={closeModal} className="w-full">닫기</Button>
            </div>
          </Modal>
        </div>
      );
    };

    // React Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
